server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  return 444;
}

server {
  listen 80;
  listen [::]:80;
  server_name @ADMIN_HOST@ @AUTH_HOST@ @REGISTER_HOST@ secrets.@PUBLIC_BASE_DOMAIN@ reference-api.@PUBLIC_BASE_DOMAIN@ alerts-primary.@PUBLIC_BASE_DOMAIN@ alerts-backup.@PUBLIC_BASE_DOMAIN@ "~^kcml[0-9]{4,}\.@PUBLIC_BASE_DOMAIN_REGEX@$";
  location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
  return 308 https://$host$request_uri;
}

server {
  listen 443 ssl http2 default_server;
  listen [::]:443 ssl http2 default_server;
  server_name _;
  ssl_certificate @TLS_CERT_PATH@;
  ssl_certificate_key @TLS_KEY_PATH@;
  return 444;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name @ADMIN_HOST@;
  ssl_certificate @TLS_CERT_PATH@;
  ssl_certificate_key @TLS_KEY_PATH@;
  client_max_body_size 1m;
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_pass http://127.0.0.1:3010;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name @AUTH_HOST@;
  ssl_certificate @TLS_CERT_PATH@;
  ssl_certificate_key @TLS_KEY_PATH@;
  client_max_body_size 128k;
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_pass http://127.0.0.1:3010;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name @REGISTER_HOST@;
  ssl_certificate @TLS_CERT_PATH@;
  ssl_certificate_key @TLS_KEY_PATH@;
  client_max_body_size 12m;
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_request_buffering on;
    proxy_pass http://127.0.0.1:3010;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name secrets.@PUBLIC_BASE_DOMAIN@;
  ssl_certificate @TLS_CERT_PATH@;
  ssl_certificate_key @TLS_KEY_PATH@;
  client_max_body_size 128k;
  location = /.well-known/kcml-secret-api {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_pass http://127.0.0.1:3010;
  }
  location = /health {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_pass http://127.0.0.1:3010;
  }
  location = /v1/secrets/resolve {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_pass http://127.0.0.1:3010;
  }
  location / { return 404; }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name reference-api.@PUBLIC_BASE_DOMAIN@;
  ssl_certificate @TLS_CERT_PATH@;
  ssl_certificate_key @TLS_KEY_PATH@;
  client_max_body_size 128k;
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_pass http://127.0.0.1:3010;
  }
}

