server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
  return 308 https://$host$request_uri;
}

server {
  listen 443 ssl http2 default_server;
  listen [::]:443 ssl http2 default_server;
  server_name _;
  ssl_certificate /etc/letsencrypt/live/wildcard.hcasc.cz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/wildcard.hcasc.cz/privkey.pem;
  return 444;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name admin.hcasc.cz;
  ssl_certificate /etc/letsencrypt/live/wildcard.hcasc.cz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/wildcard.hcasc.cz/privkey.pem;
  client_max_body_size 1m;
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://127.0.0.1:3010;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name auth.hcasc.cz;
  ssl_certificate /etc/letsencrypt/live/wildcard.hcasc.cz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/wildcard.hcasc.cz/privkey.pem;
  client_max_body_size 128k;
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://127.0.0.1:3010;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name register.hcasc.cz;
  ssl_certificate /etc/letsencrypt/live/wildcard.hcasc.cz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/wildcard.hcasc.cz/privkey.pem;
  client_max_body_size 12m;
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_request_buffering on;
    proxy_pass http://127.0.0.1:3010;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name ha-inventory.hcasc.cz;
  ssl_certificate /etc/letsencrypt/live/wildcard.hcasc.cz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/wildcard.hcasc.cz/privkey.pem;
  client_max_body_size 1k;
  location = /v1/catalog {
    allow 127.0.0.1;
    allow ::1;
    allow 89.221.222.92;
    allow 2a02:2b88:2:b5c::;
    deny all;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://127.0.0.1:8103/internal/device-inventory;
  }
  location / { return 404; }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name "~^kcml[0-9]{4,}\.hcasc\.cz$";
  ssl_certificate /etc/letsencrypt/live/wildcard.hcasc.cz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/wildcard.hcasc.cz/privkey.pem;
  client_max_body_size 1m;
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://127.0.0.1:3010;
  }
}
