name: CI and production deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "handlers/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kcml
          POSTGRES_PASSWORD: kcml-test
          POSTGRES_DB: kcml_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kcml -d kcml_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: "true"
      NODE_ENV: test
      DATABASE_URL: postgres://kcml:kcml-test@127.0.0.1:5432/kcml_test
      KCML_UPGRADE_DATABASE_URL: postgres://kcml:kcml-test@127.0.0.1:5432/kcml_upgrade_test
      ACCESS_TOKEN_HMAC_KEY_BASE64: AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=
      INTEGRATION_TOKEN_HMAC_KEY_BASE64: AgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgI=
      EGRESS_CAPABILITY_HMAC_KEY_BASE64: AwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwM=
      SESSION_SECRET_BASE64: BAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQ=
      CSRF_SECRET_BASE64: BQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQU=
      MFA_ENCRYPTION_KEY_BASE64: BgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgY=
      CONFIG_VAULT_MASTER_KEY_BASE64: SUlJSUlJSUlJSUlJSUlJSUlJSUlJSUlJSUlJSUlJSUk=
      CONFIG_VAULT_MASTER_KEY_ID: db-test-v1
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: pnpm/action-setup@v4
        with: { version: 11.7.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deployment and alert-sink checks
        run: |
          bash -n deploy/scripts/*.sh scripts/*.sh
          bash scripts/test-ci-deploy-workflow.sh
          bash scripts/test-install-release-guards.sh
          bash scripts/test-split-service-config.sh
          bash scripts/test-render-nginx-config.sh
          bash scripts/test-restore-test-permissions.sh
          node --check deploy/alert-sink/receiver.mjs
          bash scripts/test-alert-sink.sh
      - name: Clean schema migrations
        env:
          KCML_PROCESS_ROLE: migrate
        run: |
          pnpm db:migrate
          pnpm db:migrate
      - name: Bootstrap encrypted operational configuration
        env:
          KCML_PROCESS_ROLE: admin-sync
          BUILD_ID: ci-operational-config
        run: |
          pnpm --filter @kcml/server config:import-env -- --refresh-build-id
          pnpm --filter @kcml/server exec tsx src/cli/migrate-mfa-secrets.ts
      - name: Production-shape migration upgrade
        run: bash scripts/test-migration-upgrade.sh
      - name: Application-role isolation
        run: bash scripts/test-db-role-isolation.sh
      - name: PostgreSQL transaction and audit concurrency tests
        env:
          KCML_TEST_DATABASE: "1"
        run: |
          pnpm exec vitest run \
            apps/server/src/domain/audit-db.test.ts \
            apps/server/src/domain/external-api-db.test.ts \
            apps/server/src/domain/mcp-policy-db.test.ts \
            apps/server/src/domain/onboarding-db.test.ts \
            apps/server/src/domain/operational-config-db.test.ts \
            apps/server/src/domain/server-state-db.test.ts \
            apps/server/src/http/postgres-rate-limit-store-db.test.ts \
            apps/server/src/http/admin-security-db.test.ts \
            --maxWorkers=1 \
            --no-file-parallelism
      - name: Dependency audit
        run: pnpm audit --prod --audit-level=high
      - name: Lint, typecheck, all tests and build
        run: pnpm run ci
      - name: Release bundle checks
        env:
          BUILD_ID: ci-release-check
          NODE_VERSION: "24"
          PNPM_VERSION: "11.7.0"
        run: bash scripts/test-build-release.sh

  security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false, fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
        with:
          output: /tmp/codeql-results
          upload: false
      - name: Enforce clean CodeQL results
        run: |
          jq -r '.runs[].results[]? | [.ruleId, (.level // "warning"), .message.text, (.locations[0].physicalLocation.artifactLocation.uri // ""), ((.locations[0].physicalLocation.region.startLine // 0) | tostring)] | @tsv' /tmp/codeql-results/javascript.sarif
          jq -e '[.runs[].results[]?] | length == 0' /tmp/codeql-results/javascript.sarif

  release:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    needs: [ci, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: pnpm/action-setup@v4
        with: { version: 11.7.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Assemble immutable release
        env:
          BUILD_ID: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          NODE_VERSION: "24"
          PNPM_VERSION: "11.7.0"
        run: bash scripts/build-release.sh /tmp/kcml-release
      - uses: anchore/sbom-action@v0
        with:
          path: /tmp/kcml-release
          format: spdx-json
          output-file: /tmp/kcml-release.spdx.json
          upload-artifact: false
      - name: Archive and checksum release
        run: |
          install -m 0644 /tmp/kcml-release.spdx.json /tmp/kcml-release/SBOM.spdx.json
          tar --zstd --create --file /tmp/kcml-release.tar.zst --directory /tmp/kcml-release .
          (cd /tmp && sha256sum kcml-release.tar.zst > kcml-release.tar.zst.sha256)
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - name: Keyless-sign release bundle through GitHub OIDC
        run: cosign sign-blob --yes --bundle /tmp/kcml-release.tar.zst.sigstore.json /tmp/kcml-release.tar.zst
      - uses: actions/upload-artifact@v4
        with:
          name: kcml-release-${{ github.sha }}
          path: |
            /tmp/kcml-release.tar.zst
            /tmp/kcml-release.tar.zst.sha256
            /tmp/kcml-release.tar.zst.sigstore.json
            /tmp/kcml-release.spdx.json
          if-no-files-found: error
          retention-days: 14

  deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    needs: [ci, security, release]
    runs-on: [self-hosted, kcml-deploy]
    timeout-minutes: 30
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Select only the latest main revision for deployment
        id: freshness
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          current_sha="$(
            curl --fail --silent --show-error --location \
              --proto '=https' --tlsv1.2 \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/git/ref/heads/main" \
              | jq -er '.object.sha'
          )"
          if [ "$current_sha" = "$EXPECTED_SHA" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping stale production revision $EXPECTED_SHA; main is $current_sha"
          fi
      - uses: actions/download-artifact@v4
        if: steps.freshness.outputs.should_deploy == 'true'
        with:
          name: kcml-release-${{ github.sha }}
          path: ${{ runner.temp }}/kcml-release
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: steps.freshness.outputs.should_deploy == 'true'
        with:
          cosign-release: v3.1.1
      - name: Verify checksum and GitHub Actions signing identity
        if: steps.freshness.outputs.should_deploy == 'true'
        working-directory: ${{ runner.temp }}/kcml-release
        run: |
          set -euo pipefail
          sha256sum --check kcml-release.tar.zst.sha256
          cosign verify-blob kcml-release.tar.zst \
            --bundle kcml-release.tar.zst.sigstore.json \
            --certificate-identity=https://github.com/${{ github.repository }}/.github/workflows/ci-deploy.yml@refs/heads/main \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com
      - name: Deploy verified release
        if: steps.freshness.outputs.should_deploy == 'true'
        env:
          PASS: ${{ secrets.PASS }}
          GHCR_TOKEN: ${{ github.token }}
          GHCR_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "::add-mask::$PASS"
          echo "::add-mask::$GHCR_TOKEN"
          test -n "$PASS"
          test -n "$GHCR_TOKEN"
          sudo --preserve-env=PASS,GHCR_TOKEN,GHCR_ACTOR /usr/local/sbin/kcml-deploy-wrapper \
            "${{ runner.temp }}/kcml-release/kcml-release.tar.zst" \
            "${{ github.repository }}" \
            "${{ github.sha }}" \
            "${{ github.run_id }}" \
            "${{ github.run_attempt }}" \
            "${{ github.event_name }}"
