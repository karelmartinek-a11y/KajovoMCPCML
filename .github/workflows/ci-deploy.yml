name: CI and production deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci
    runs-on: [self-hosted, kcml-production]
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Mask UI password
        run: |
          echo "::add-mask::${{ secrets.PASS }}"
      - name: Deploy on production server
        env:
          PASS: ${{ secrets.PASS }}
        run: |
          set -euo pipefail
          test -f /etc/kcml/kcml.env
          set -a
          . /etc/kcml/kcml.env
          set +a
          test -n "${PASS:-}"
          chmod +x deploy/scripts/*.sh
          deploy/scripts/preflight.sh
          deploy/scripts/backup.sh
          corepack enable
          CI=true pnpm install --frozen-lockfile --prod=false
          pnpm --filter @kcml/admin-ui build
          pnpm --filter @kcml/server build
          pnpm db:migrate
          PASS="$PASS" pnpm admin:sync-password
          rsync -a --delete --exclude '.git' --exclude 'node_modules' "$GITHUB_WORKSPACE"/ /opt/kcml/current/
          systemctl restart kcml
          curl -fsS -H 'Host: admin.hcasc.cz' "http://127.0.0.1:${PORT}/health" >/dev/null
