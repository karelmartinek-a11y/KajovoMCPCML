name: Build signed repository component images

on:
  push:
    branches: [main]
    paths:
      - "components/**"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.changed.outputs.components }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: false
      - id: changed
        run: |
          components="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | awk -F/ '/^components\/[a-z0-9][a-z0-9-]{2,62}\// {print $1"/"$2}' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          echo "components=$components" >> "$GITHUB_OUTPUT"

  build-sign-publish:
    needs: discover
    if: needs.discover.outputs.components != '[]'
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.discover.outputs.components) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: names
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          key="${COMPONENT#components/}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/kajovocml-components/${key}:${GITHUB_SHA}"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/handler-runtime/Dockerfile
          build-args: HANDLER_DIR=${{ matrix.component }}
          push: true
          tags: ${{ steps.names.outputs.image }}
          provenance: false
          sbom: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: v3.1.1
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.names.outputs.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/component.spdx.json
          upload-artifact: false
      - name: Create trusted provenance predicate
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          PUBLIC_BASE_DOMAIN: ${{ vars.PUBLIC_BASE_DOMAIN || 'hcasc.cz' }}
        run: |
          jq -n \
            --arg commit "$GITHUB_SHA" \
            --arg builder "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/repository-component-build.yml@refs/heads/main" \
            --arg source "git+https://github.com/${GITHUB_REPOSITORY}@${GITHUB_SHA}" \
            --arg component "${{ matrix.component }}" \
            --arg digest "$IMAGE_DIGEST" \
            --arg base "$PUBLIC_BASE_DOMAIN" \
            '{builder:{id:$builder},buildType:("https://" + $base + "/kcml/repository-component-build/v1"),invocation:{configSource:{uri:$source,digest:{sha1:$commit},entryPoint:".github/workflows/repository-component-build.yml"},parameters:{component:$component},environment:{}},metadata:{buildInvocationID:env.GITHUB_RUN_ID,completeness:{parameters:true,environment:true,materials:true},reproducible:true},materials:[{uri:$source,digest:{sha1:$commit}}],subject:[{name:$component,digest:{sha256:($digest|sub("^sha256:";""))}}]}' \
            > /tmp/provenance.json
      - name: Keyless-sign image, SBOM and provenance
        env:
          IMAGE: ${{ steps.names.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "$IMAGE"
          cosign attest --yes --type spdxjson --predicate /tmp/component.spdx.json "$IMAGE"
          cosign attest --yes --type slsaprovenance --predicate /tmp/provenance.json "$IMAGE"
