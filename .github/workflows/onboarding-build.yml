name: Build signed MCP handler images

on:
  push:
    branches: [main]
    paths:
      - "handlers/**"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      handlers: ${{ steps.changed.outputs.handlers }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2, persist-credentials: false }
      - id: changed
        run: |
          handlers="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | awk -F/ '/^handlers\/KCML[0-9]{4,}\// {print $1"/"$2}' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          echo "handlers=$handlers" >> "$GITHUB_OUTPUT"

  build-sign-publish:
    needs: discover
    if: needs.discover.outputs.handlers != '[]'
    strategy:
      fail-fast: false
      matrix:
        handler: ${{ fromJson(needs.discover.outputs.handlers) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: names
        env:
          HANDLER: ${{ matrix.handler }}
        run: |
          code="${HANDLER#handlers/}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/kajovocml-handlers/${code,,}:${GITHUB_SHA}"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/handler-runtime/Dockerfile
          build-args: HANDLER_DIR=${{ matrix.handler }}
          push: true
          tags: ${{ steps.names.outputs.image }}
          provenance: false
          sbom: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.names.outputs.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/handler.spdx.json
          upload-artifact: false
      - name: Create trusted provenance predicate
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          PUBLIC_BASE_DOMAIN: ${{ vars.PUBLIC_BASE_DOMAIN || 'hcasc.cz' }}
        run: |
          jq -n \
            --arg commit "$GITHUB_SHA" \
            --arg builder "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/onboarding-build.yml@refs/heads/main" \
            --arg source "git+https://github.com/${GITHUB_REPOSITORY}@${GITHUB_SHA}" \
            --arg handler "${{ matrix.handler }}" \
            --arg digest "$IMAGE_DIGEST" \
            --arg base "$PUBLIC_BASE_DOMAIN" \
            '{builder:{id:$builder},buildType:("https://" + $base + "/kcml/handler-build/v1"),invocation:{configSource:{uri:$source,digest:{sha1:$commit},entryPoint:".github/workflows/onboarding-build.yml"},parameters:{handler:$handler},environment:{}},metadata:{buildInvocationID:env.GITHUB_RUN_ID,completeness:{parameters:true,environment:true,materials:true},reproducible:false},materials:[{uri:$source,digest:{sha1:$commit}}],subject:[{name:$handler,digest:{sha256:($digest|sub("^sha256:";""))}}]}' \
            > /tmp/provenance.json
      - name: Keyless-sign image, SBOM and provenance
        env:
          IMAGE: ${{ steps.names.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "$IMAGE"
          cosign attest --yes --type spdxjson --predicate /tmp/handler.spdx.json "$IMAGE"
          cosign attest --yes --type slsaprovenance --predicate /tmp/provenance.json "$IMAGE"
